name: Build APK for Huawei Tablet

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "=== Files in repo ==="
          ls -la
          for f in app_android.py buildozer.spec; do
            if [ ! -f "$f" ]; then
              echo "ERROR: $f not found!"
              exit 1
            else
              echo "OK: $f"
            fi
          done
          if [ ! -f "NotoSansCJKsc-Regular.otf" ]; then
            echo "WARNING: Font file not found, Chinese may not display correctly"
          else
            echo "OK: NotoSansCJKsc-Regular.otf"
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential git zip unzip \
            openjdk-17-jdk autoconf libtool \
            pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev \
            cmake ninja-build

      - name: Cache .buildozer global
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ runner.os }}-v1
          restore-keys: buildozer-global-${{ runner.os }}-

      - name: Cache .buildozer local
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-local-${{ hashFiles('buildozer.spec') }}-v1
          restore-keys: buildozer-local-

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip wheel setuptools
          pip install buildozer==1.5.0 cython==0.29.37

      - name: Build debug APK
        run: |
          buildozer -v android debug 2>&1 | tee build.log
          echo "=== Build result ==="
          ls -la bin/ 2>/dev/null || echo "bin/ not found"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: GarbageClassifier-Huawei-APK
          path: |
            bin/*.apk
            build.log
          retention-days: 30
