name: Build APK for Huawei Tablet

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "=== Files in repo ==="
          ls -la
          for f in app_android.py buildozer.spec; do
            if [ ! -f "$f" ]; then echo "ERROR: $f not found!"; exit 1
            else echo "OK: $f"; fi
          done

      # Python 3.11 必须与 buildozer.spec 里的 python3==3.11.0 完全一致
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential git zip unzip \
            openjdk-17-jdk autoconf libtool \
            pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev cmake ninja-build

      - name: Cache ~/.buildozer (SDK/NDK)
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-home-${{ runner.os }}-v4
          restore-keys: buildozer-home-${{ runner.os }}-

      - name: Cache .buildozer (local build)
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-local-${{ hashFiles('buildozer.spec') }}-v4
          restore-keys: buildozer-local-

      # buildozer==1.5.0 已从 PyPI 下架，必须从 git 安装
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip wheel setuptools
          pip install cython==0.29.37
          pip install git+https://github.com/kivy/buildozer.git@stable

      - name: Build debug APK
        run: |
          buildozer -v android debug 2>&1 | tee build.log
          echo "=== Build result ==="
          ls -la bin/ 2>/dev/null || echo "bin/ not found - check build.log"

      - name: Upload APK and log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: GarbageClassifier-Huawei-APK
          path: |
            bin/*.apk
            build.log
          retention-days: 30
